services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metadata
    ports:
      - "3306:3306"

  api:
    build: .
    command: >
      sh -c "
      sleep 20 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
